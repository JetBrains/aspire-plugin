# Dependabot configuration:
# https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Maintain dependencies for Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      # These must match the versions bundled in the target IDE (see gradle/libs.versions.toml).
      - dependency-name: "io.grpc*"
      - dependency-name: "com.google.protobuf*"
      - dependency-name: "io.ktor*"
      - dependency-name: "org.jetbrains.kotlinx*"
      - dependency-name: "com.jetbrains.rd*"
  # Maintain dependencies for NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
  # Maintain dependencies for global.json
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
